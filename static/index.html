<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UMRM Video Label UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">UMRM Labeling Workspace</p>
          <h1>视频片段标注台</h1>
        </div>
        <div class="status-group">
          <span class="pill" id="vlmStatus">VLM: 未配置</span>
          <span class="pill" id="translateStatus">翻译: 备用通道</span>
          <span class="pill" id="foleyStatus">Foley: 未检查</span>
        </div>
      </header>

      <section class="root-panel card">
        <label class="field">
          <span>服务器视频目录</span>
          <div class="inline-row">
            <input id="videoRootInput" type="text" />
            <button id="refreshVideosBtn" type="button">读取目录</button>
          </div>
        </label>
        <label class="field upload-field">
          <span>上传视频到当前目录</span>
          <div class="inline-row">
            <input id="uploadInput" type="file" accept="video/*" />
            <button id="uploadBtn" type="button">上传</button>
          </div>
        </label>
        <div class="message" id="rootMessage"></div>
      </section>

      <section class="settings-panel card">
        <div class="section-header">
          <h2>服务配置</h2>
          <button id="saveSettingsBtn" type="button">保存配置</button>
        </div>
        <div class="settings-grid">
          <label class="field">
            <span>VLM Base URL</span>
            <input id="vlmApiBaseInput" type="text" placeholder="https://.../v1" />
          </label>
          <label class="field">
            <span>VLM Model</span>
            <input id="vlmModelInput" type="text" placeholder="例如 gemini-2.5-pro / gpt-4.1" />
          </label>
          <label class="field">
            <span>VLM API Key</span>
            <input id="vlmApiKeyInput" type="password" placeholder="留空则保留现有 key" />
          </label>
          <label class="field">
            <span>Foley Conda 环境</span>
            <input id="foleyCondaEnvInput" type="text" />
          </label>
          <label class="field">
            <span>Foley 项目目录</span>
            <input id="foleyProjectDirInput" type="text" />
          </label>
          <label class="field">
            <span>Foley 模型目录</span>
            <input id="foleyModelPathInput" type="text" />
          </label>
          <label class="field">
            <span>Foley GPU ID</span>
            <input id="foleyGpuIdInput" type="number" min="0" step="1" value="0" />
          </label>
          <label class="field">
            <span>Foley Model Size</span>
            <select id="foleyModelSizeInput">
              <option value="xl">xl</option>
              <option value="xxl">xxl</option>
            </select>
          </label>
          <label class="field">
            <span>Guidance Scale</span>
            <input id="foleyGuidanceInput" type="number" step="0.1" />
          </label>
          <label class="field">
            <span>Inference Steps</span>
            <input id="foleyStepsInput" type="number" step="1" />
          </label>
        </div>
        <div class="inline-row compact">
          <label><input id="foleyOffloadInput" type="checkbox" /> Foley 启用 Offload</label>
          <span class="video-path" id="vlmKeyHint">VLM key: 未设置</span>
        </div>
        <div class="message" id="settingsMessage"></div>
      </section>

      <main class="layout">
        <aside class="sidebar card">
          <div class="section-header">
            <h2>视频列表</h2>
            <span id="videoCount">0 个</span>
          </div>
          <div class="video-list" id="videoList"></div>
        </aside>

        <section class="viewer card">
          <div class="section-header">
            <div>
              <h2>视频预览</h2>
              <p id="selectedVideoMeta">请选择左侧视频</p>
            </div>
            <button id="reloadAnnotationsBtn" type="button" class="ghost-btn">
              刷新最近保存
            </button>
          </div>

          <video id="videoPlayer" controls preload="metadata"></video>

          <div class="clip-grid">
            <div class="clip-card">
              <div class="section-header small">
                <h3>片段选择</h3>
                <span id="durationLabel">总时长: --</span>
              </div>
              <div class="inline-row compact">
                <button id="setStartBtn" type="button">当前时间设为开始</button>
                <button id="setEndBtn" type="button">当前时间设为结束</button>
                <button id="jumpStartBtn" type="button" class="ghost-btn">跳到开始</button>
                <button id="jumpEndBtn" type="button" class="ghost-btn">跳到结束</button>
              </div>
              <div class="time-grid">
                <label class="field">
                  <span>开始时间 (s)</span>
                  <input id="clipStartInput" type="number" min="0" step="0.1" value="0" />
                </label>
                <label class="field">
                  <span>结束时间 (s)</span>
                  <input id="clipEndInput" type="number" min="0" step="0.1" value="5" />
                </label>
              </div>
              <div class="message" id="clipValidationMessage"></div>
            </div>

            <div class="clip-card">
              <div class="section-header small">
                <h3>翻译工具</h3>
                <button id="translateBtn" type="button">中文转英文</button>
              </div>
              <label class="field">
                <span>中文输入</span>
                <textarea id="translateSource" rows="4" placeholder="输入要翻译的中文"></textarea>
              </label>
              <label class="field">
                <span>英文结果</span>
                <textarea id="translateResult" rows="4" placeholder="翻译结果会显示在这里"></textarea>
              </label>
              <div class="inline-row compact">
                <button type="button" class="ghost-btn fill-translate" data-target="currentStateInput">
                  填入 Current State
                </button>
                <button type="button" class="ghost-btn fill-translate" data-target="reactionInput">
                  填入 Reaction
                </button>
                <button type="button" class="ghost-btn fill-translate" data-target="motionPromptInput">
                  填入 Motion Prompt
                </button>
              </div>
              <div class="message" id="translateMessage"></div>
            </div>
          </div>

          <section class="annotation-form">
            <div class="section-header">
              <h2>标注表单</h2>
              <button id="saveBtn" type="button">保存标注</button>
            </div>

            <div class="toggle-row">
              <label><input id="useVlmInput" type="checkbox" /> 使用 VLM 理解当前片段</label>
              <button id="runVlmBtn" type="button">生成 / 更新 Current State</button>
            </div>

            <label class="field">
              <span>VLM 指令补充</span>
              <textarea
                id="vlmPromptInput"
                rows="3"
                placeholder="可选：比如强调人物、环境变化、动作触发因素等"
              ></textarea>
            </label>

            <label class="field">
              <span>Current State</span>
              <textarea
                id="currentStateInput"
                rows="5"
                placeholder="填写当前视频片段对应的 current state"
              ></textarea>
            </label>

            <label class="field">
              <span>VLM 理解结果</span>
              <textarea
                id="vlmSummaryOutput"
                rows="4"
                placeholder="如果调用 VLM，摘要会显示在这里"
                readonly
              ></textarea>
            </label>

            <div class="toggle-row">
              <label><input id="useEditingInput" type="checkbox" /> 使用 Editing</label>
              <button id="editingRunBtn" type="button" class="ghost-btn">启动 Foley 配音</button>
            </div>

            <div id="editingFields" class="editing-fields hidden">
              <label class="field">
                <span>Editing Prompt</span>
                <textarea
                  id="editingPromptInput"
                  rows="4"
                  placeholder="启用 Editing 后必填，用于驱动 Foley 生成"
                ></textarea>
              </label>
              <div class="time-grid">
                <label class="field">
                  <span>Editing 开始时间 (s)</span>
                  <input id="editingStartInput" type="number" min="0" step="0.1" value="0" />
                </label>
                <label class="field">
                  <span>Editing 结束时间 (s)</span>
                  <input id="editingEndInput" type="number" min="0" step="0.1" value="0" />
                </label>
              </div>
              <div class="message" id="editingMessage"></div>
              <div class="progress-box">
                <div class="inline-row compact">
                  <span class="pill" id="editingStageLabel">阶段: 未开始</span>
                  <span class="pill" id="editingProgressText">进度: --</span>
                  <span class="pill" id="editingEtaLabel">ETA: --</span>
                  <span class="pill" id="editingElapsedLabel">耗时: --</span>
                </div>
                <progress id="editingProgressBar" max="100" value="0"></progress>
                <label class="field">
                  <span>最近日志</span>
                  <textarea
                    id="editingLogOutput"
                    rows="8"
                    readonly
                    placeholder="Foley 任务日志会显示在这里"
                  ></textarea>
                </label>
              </div>
              <div class="result-grid">
                <div class="result-card">
                  <h3>生成音频</h3>
                  <audio id="editingAudioPlayer" controls></audio>
                  <p class="video-path" id="editingAudioPath"></p>
                </div>
                <div class="result-card">
                  <h3>带音视频</h3>
                  <video id="editingVideoPlayer" controls preload="metadata"></video>
                  <p class="video-path" id="editingVideoPath"></p>
                </div>
              </div>
            </div>

            <div class="field-group">
              <label class="field required">
                <span>Reaction</span>
                <textarea id="reactionInput" rows="4" placeholder="必填"></textarea>
              </label>
              <button type="button" class="ghost-btn translate-target" data-target="reactionInput">
                翻译这个字段
              </button>
            </div>

            <div class="field-group">
              <label class="field required">
                <span>Motion Prompt</span>
                <textarea id="motionPromptInput" rows="4" placeholder="必填"></textarea>
              </label>
              <button
                type="button"
                class="ghost-btn translate-target"
                data-target="motionPromptInput"
              >
                翻译这个字段
              </button>
            </div>

            <div class="field-group">
              <label class="field">
                <span>备注</span>
                <textarea id="notesInput" rows="3" placeholder="可选"></textarea>
              </label>
              <button
                type="button"
                class="ghost-btn translate-target"
                data-target="currentStateInput"
              >
                翻译 Current State
              </button>
            </div>

            <div class="message" id="saveMessage"></div>
          </section>
        </section>

        <aside class="recent card">
          <div class="section-header">
            <h2>最近保存</h2>
            <span>最多 50 条</span>
          </div>
          <div class="recent-list" id="recentList"></div>
        </aside>
      </main>
    </div>

    <template id="videoItemTemplate">
      <button type="button" class="video-item">
        <strong class="video-name"></strong>
        <span class="video-path"></span>
      </button>
    </template>

    <template id="recentItemTemplate">
      <article class="recent-item">
        <h3></h3>
        <p class="recent-meta"></p>
        <p class="recent-text"></p>
      </article>
    </template>

    <script src="/app.js" defer></script>
  </body>
</html>
